
esphome:
  name: midea_aframe

esp8266:
  board: esp01_1m
  framework:
    version: recommended

api:
ota:
  platform: esphome

wifi:
  fast_connect: true
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
  baud_rate: 0

uart:
  tx_pin: 1
  rx_pin: 3
  baud_rate: 9600

climate:
  - platform: midea
    name: Midea A-Frame
    period: 1s
    timeout: 2s
    num_attempts: 3
    autoconf: true
    beeper: true
